<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <nav>
        <div class="logo">
            <h1>Night</h1>
        </div>
        <div class="menu">
            <div><a href="#home">Home</a></div>
            <div><a href="#about">About</a></div>
            <div><a href="#portfolio">Portfolio</a></div>
            <div><a href="#contact">Contact</a></div>

        </div>
    </nav>
    <div class="home" id="home">
       
        <div class="top" >
            <div class="text-1">
                <span>Hey There,</span>
                <span>I'm Night</span>
                
            </div>
            <div class="text-2">
                <a href="https://github.com/night-sornram">
                    <img src="images/github.png" width="150px" height="150px" alt="">
                </a>
            </div>
            <div class="text-3">
                <a href="https://www.facebook.com/profile.php?id=100011855194698">
                    <img src="images/facebook.png" width="150px" height="150px" alt="">
                </a>
            </div>
            <div class="text-4">
                <a href="https://www.instagram.com/scni.ght/">
                    <img src="images/ig.png" width="150px" height="150px" alt="">
                </a>
            </div>
            <img src="images/man.png" alt="picture" class="picture" width="600px" height="600px">
        </div>
    </div>
    <div class="about" id="about">
        <div class="about-left">
            <div id="skill-head">
                Tech Stack
            </div>
            <div class="skill-card">
                <span class="logo">
                    <img src="images/html.png" width="100px" height="100px" alt="html">
                </span>
                <span>HTML</span>
            </div>
            <div class="skill-card">
                <span class="logo">
                    <img src="images/css.png" width="100px" height="100px" alt="html">
                </span>
                <span>CSS</span>
            </div>
            <div class="skill-card">
                <span class="logo">
                    <img src="images/JS.png" width="100px" height="100px" alt="html">
                </span>
                <span>Javascript</span>
            </div>
        </div>
        <div class="about-right">
            <div id="about-head">
                About Me
            </div>
            <div class="text-about"> 
                Hello, I am currently studying at the Faculty of Computer Engineering. I'm a newbie studying to be a front-end.
            </div>
        </div>
    </div>
    <div class="portfolio" id="portfolio">
        <div class="pro-head">
            Portfolio
        </div>
        <div class="allcard">
            <div class="card-portfolio">
                <a href="https://github.com/night-sornram/Results_summary_component">
                <img src="images/re.png" class="card-image" alt="">
                </a>
            </div>
            <div class="card-portfolio">
                <a href="https://github.com/night-sornram/NFT-preview-card-component">
                <img src="images/nft.png" class="card-image" alt="">
                </a>
            </div>
            <div class="card-portfolio">
                <a href="https://github.com/night-sornram/QR-code-component">
                <img src="images/qr.png" class="card-image" alt="">
                </a>
            </div>
            <div class="card-portfolio">
                <a href="https://github.com/night-sornram/product-preview-card-component">
                <img src="images/product.png" class="card-image" alt="">
                </a>
            </div>
            
        </div>
        
    </div>
    <div class="contact" id="contact">
        <div class="contact-head">
            Contact
        </div>
        <form action="https://formspree.io/f/xvojvarg" method="post">
            <input type="text" name="Name" placeholder="Full-Name" id="inputname" required>
            <input type="email" name="Email" placeholder="Email" id="inputemail" required>
            <textarea name="Message" id="textarea" cols="30" rows="10"></textarea>
            <button id="submit" type="submit">Send</button>
        </form>


    </div>
</body>
</html>
